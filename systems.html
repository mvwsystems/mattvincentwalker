<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--ash) var(--black); }

nav { position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;background:linear-gradient(to bottom,rgba(15,13,11,0.95),rgba(15,13,11,0.8));backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,147,90,0.08); }
.nav-logo { font-family:var(--font-display);font-size:1.1rem;color:var(--amber);text-decoration:none;letter-spacing:0.04em;cursor:pointer; }
.nav-right { display:flex;align-items:center;gap:24px; }
.nav-stats { font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);letter-spacing:0.06em; }
.nav-stats span { color:var(--amber); }
.nav-back { font-size:0.75rem;color:var(--warm-gray);cursor:pointer;opacity:0;pointer-events:none;transition:all 0.4s; }
.nav-back.show { opacity:1;pointer-events:all; }
.nav-back:hover { color:var(--amber); }
.nav-dropdown { position:relative; }
.nav-dropdown-btn { font-size:0.75rem;color:var(--warm-gray);cursor:pointer;padding:6px 14px;border:1px solid var(--ash);border-radius:4px;background:transparent;font-family:var(--font-body);transition:all 0.3s; }
.nav-dropdown-btn:hover { border-color:var(--amber-dim);color:var(--amber); }
.nav-dropdown-menu { position:absolute;top:100%;right:0;margin-top:8px;background:var(--charcoal);border:1px solid var(--ash);border-radius:8px;padding:8px 0;min-width:380px;max-height:70vh;overflow-y:auto;opacity:0;transform:translateY(-8px);pointer-events:none;transition:all 0.3s var(--ease-out-quart);z-index:1001; }
.nav-dropdown.open .nav-dropdown-menu { opacity:1;transform:translateY(0);pointer-events:all; }
.nav-dropdown-item { display:flex;justify-content:space-between;align-items:center;padding:8px 16px;cursor:pointer;transition:background 0.2s; }
.nav-dropdown-item:hover { background:var(--stone); }
.nav-dropdown-item-name { font-size:0.75rem;color:var(--light); }
.nav-dropdown-item-count { font-family:var(--font-mono);font-size:0.65rem;color:var(--amber-dim); }
/* Site nav panel (hamburger) */
.nav-toggle { display:flex;cursor:pointer;flex-direction:column;gap:6px;width:28px;height:20px;justify-content:center;position:relative;z-index:1001; }
.nav-toggle span { width:28px;height:1.5px;background:var(--white);transition:all 0.4s var(--ease-out-expo);transform-origin:center;display:block; }
.nav-toggle.active span:nth-child(1) { transform:translateY(3.75px) rotate(45deg); }
.nav-toggle.active span:nth-child(2) { opacity:0;transform:scaleX(0); }
.nav-toggle.active span:nth-child(3) { transform:translateY(-3.75px) rotate(-45deg); }
.nav-overlay { position:fixed;inset:0;z-index:998;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:opacity 0.5s,visibility 0.5s; }
.nav-overlay.open { opacity:1;visibility:visible; }
.nav-links { list-style:none;display:flex;flex-direction:column;position:fixed;top:0;right:0;height:100vh;width:340px;background:rgba(14,12,10,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:1px solid var(--stone);padding:100px 48px 48px;gap:0;margin:0;transform:translateX(100%);transition:transform 0.6s var(--ease-out-expo);z-index:999; }
.nav-links.open { transform:translateX(0); }
.nav-links li { list-style:none;margin:0;padding:0;opacity:0;transform:translateX(20px);transition:opacity 0.4s var(--ease-out-expo),transform 0.4s var(--ease-out-expo); }
.nav-links.open li { opacity:1;transform:translateX(0); }
.nav-links.open li:nth-child(1){transition-delay:0.06s}.nav-links.open li:nth-child(2){transition-delay:0.10s}.nav-links.open li:nth-child(3){transition-delay:0.14s}.nav-links.open li:nth-child(4){transition-delay:0.18s}.nav-links.open li:nth-child(5){transition-delay:0.22s}.nav-links.open li:nth-child(6){transition-delay:0.26s}.nav-links.open li:nth-child(7){transition-delay:0.30s}.nav-links.open li:nth-child(8){transition-delay:0.34s}.nav-links.open li:nth-child(9){transition-delay:0.38s}
.nav-links li a { font-family:var(--font-body);font-size:14px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--warm-gray);transition:color 0.3s;padding:18px 0;display:block;text-decoration:none; }
.nav-links li:not(:last-child) { border-bottom:1px solid var(--stone); }
.nav-links li a:hover, .nav-links li a.active { color:var(--white); }

.nav-links li:not(:last-child) a { position:relative; }
.nav-links li:not(:last-child) a::after { content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:var(--amber);transform:scaleX(0);transform-origin:right;transition:transform 0.5s var(--ease-out-expo); }
.nav-links li:not(:last-child) a:hover::after { transform:scaleX(1);transform-origin:left; }
/* Custom cursor */
.custom-cursor { position:fixed;width:36px;height:36px;border:1px solid rgba(200,147,90,0.3);border-radius:50%;pointer-events:none;z-index:9998;transition:width 0.4s var(--ease-out-expo),height 0.4s var(--ease-out-expo),border-color 0.3s,background 0.3s;transform:translate(-50%,-50%); }
.custom-cursor.hovering { width:56px;height:56px;background:rgba(200,147,90,0.06);border-color:var(--amber); }
.cursor-dot { position:fixed;width:4px;height:4px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%); }
@media (max-width:900px) { .custom-cursor,.cursor-dot { display:none !important; } }
.nav-links li:last-child { margin-top:24px;border-bottom:none; }
.nav-links li:last-child a.nav-cta { font-family:var(--font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--black);background:var(--amber);padding:14px 0;display:block;text-align:center;transition:all 0.4s; }
.nav-links li:last-child a.nav-cta:hover { background:var(--amber-glow); }

.page { display:none;min-height:100vh; }
.page.active { display:block;animation:fadeIn 0.5s var(--ease-out-expo); }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.hero { padding:140px 48px 80px;text-align:center; }
.hero-pre { font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:24px; }
.hero h1 { font-family:var(--font-display);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;color:var(--cream);line-height:1.15;margin-bottom:20px; }
.hero h1 em { color:var(--amber);font-style:italic; }
.hero-sub { font-size:0.9rem;color:var(--warm-gray);max-width:500px;margin:0 auto 48px; }
.hero-count { display:flex;justify-content:center;gap:64px;margin-top:48px; }
.hero-stat { text-align:center; }
.hero-stat-num { font-family:var(--font-display);font-size:3.5rem;font-weight:300;color:var(--amber); }
.hero-stat-label { font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px; }

.cards-section { padding:0 48px 100px;max-width:1200px;margin:0 auto; }
.cards-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px; }
.card { background:var(--charcoal);border:1px solid var(--ash);border-radius:10px;padding:28px;cursor:pointer;transition:all 0.4s var(--ease-out-quart);position:relative;overflow:hidden; }
.card:hover { transform:translateY(-4px);border-color:var(--amber-dim);box-shadow:0 12px 40px rgba(200,147,90,0.08); }
.card-num { font-family:var(--font-mono);font-size:0.65rem;color:var(--amber-dim);letter-spacing:0.1em; }
.card-title { font-family:var(--font-display);font-size:1.3rem;color:var(--cream);margin:8px 0 4px;font-weight:400; }
.card-tagline { font-size:0.8rem;color:var(--muted);margin-bottom:16px; }
.card-count { font-family:var(--font-mono);font-size:0.65rem;color:var(--amber);background:rgba(200,147,90,0.1);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:12px; }
.card-tags { display:flex;flex-wrap:wrap;gap:6px; }
.card-tag { font-size:0.65rem;color:var(--warm-gray);background:var(--stone);padding:3px 8px;border-radius:4px; }
.card-arrow { position:absolute;bottom:20px;right:20px;font-size:1.2rem;color:var(--amber);opacity:0;transform:translateX(-8px);transition:all 0.3s; }
.card:hover .card-arrow { opacity:1;transform:translateX(0); }

.card-submit { background:transparent;border:1px dashed var(--amber-dim);border-radius:10px;padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:200px;cursor:pointer;transition:all 0.4s var(--ease-out-quart); }
.card-submit:hover { border-color:var(--amber);background:rgba(200,147,90,0.04); }
.card-submit-icon { font-size:2rem;color:var(--amber-dim);margin-bottom:12px; }
.card-submit-title { font-family:var(--font-display);font-size:1.2rem;color:var(--cream);margin-bottom:8px;font-weight:400; }
.card-submit-desc { font-size:0.8rem;color:var(--muted);line-height:1.6;max-width:260px; }

.submit-section { padding:0 48px 120px;max-width:680px;margin:0 auto; }
.submit-section-title { font-family:var(--font-display);font-size:1.8rem;color:var(--cream);font-weight:300;margin-bottom:8px; }
.submit-section-sub { font-size:0.85rem;color:var(--muted);margin-bottom:32px; }
.submit-form { display:flex;flex-direction:column;gap:16px; }
.submit-field { display:flex;flex-direction:column;gap:6px; }
.submit-label { font-size:0.7rem;color:var(--warm-gray);letter-spacing:0.1em;text-transform:uppercase; }
.submit-input,.submit-textarea { width:100%;padding:12px 16px;background:var(--charcoal);border:1px solid var(--ash);border-radius:6px;color:var(--light);font-family:var(--font-body);font-size:0.85rem;outline:none;transition:border 0.3s; }
.submit-input:focus,.submit-textarea:focus { border-color:var(--amber-dim); }
.submit-input::placeholder,.submit-textarea::placeholder { color:var(--muted); }
.submit-textarea { min-height:100px;resize:vertical;line-height:1.6; }
.submit-btn { align-self:flex-start;padding:12px 32px;background:transparent;border:1px solid var(--amber-dim);border-radius:6px;color:var(--amber);font-family:var(--font-body);font-size:0.85rem;cursor:pointer;transition:all 0.3s;letter-spacing:0.04em; }
.submit-btn:hover { background:rgba(200,147,90,0.1);border-color:var(--amber); }

.submit-success-text { font-family:var(--font-display);font-size:1.1rem;color:var(--amber); }
.submit-success-sub { font-size:0.8rem;color:var(--muted);margin-top:6px; }

.detail-header { padding:120px 48px 40px;max-width:1000px;margin:0 auto;border-bottom:1px solid var(--ash); }
.detail-num { font-family:var(--font-mono);font-size:0.7rem;color:var(--amber-dim);letter-spacing:0.15em; }
.detail-title { font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);font-weight:300;color:var(--cream);margin:8px 0 4px; }
.detail-tagline { font-size:0.95rem;color:var(--muted);margin-bottom:16px; }
.detail-stats { font-family:var(--font-mono);font-size:0.7rem;color:var(--amber); }
.detail-search { padding:20px 48px;max-width:1000px;margin:0 auto;position:sticky;top:56px;z-index:100;background:linear-gradient(to bottom,var(--black-warm),rgba(15,13,11,0.95));backdrop-filter:blur(12px); }
.detail-search input { width:100%;padding:10px 16px;background:var(--charcoal);border:1px solid var(--ash);border-radius:6px;color:var(--light);font-family:var(--font-body);font-size:0.85rem;outline:none;transition:border 0.3s; }
.detail-search input:focus { border-color:var(--amber-dim); }
.detail-search input::placeholder { color:var(--muted); }
.detail-count { font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-top:8px; }

.systems-list { padding:20px 48px 80px;max-width:1000px;margin:0 auto; }
.sys-row { display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:12px;padding:14px 0;border-bottom:1px solid rgba(74,70,67,0.3);opacity:0;transform:translateY(12px);transition:all 0.5s var(--ease-out-quart); }
.sys-row.visible { opacity:1;transform:translateY(0); }
.sys-idx { font-family:var(--font-mono);font-size:0.65rem;color:var(--ash);padding-top:3px; }
.sys-name { font-size:0.85rem;color:var(--cream);font-weight:400; }
.sys-type { font-size:0.75rem;color:var(--warm-gray); }
.sys-disc { font-size:0.75rem;color:var(--muted); }
.sys-desc { grid-column:2/-1;font-size:0.75rem;color:var(--amber-dim);font-style:italic;margin-top:-4px; }

.detail-nav { display:flex;justify-content:space-between;padding:60px 48px;max-width:1000px;margin:0 auto;border-top:1px solid var(--ash); }
.detail-nav-link { cursor:pointer;transition:color 0.3s; }
.detail-nav-link:hover { color:var(--amber); }
.detail-nav-dir { font-size:0.7rem;color:var(--muted);display:block; }
.detail-nav-name { font-family:var(--font-display);font-size:1rem;color:var(--light); }
.detail-nav-link:hover .detail-nav-name { color:var(--amber); }
.detail-nav-link.next { text-align:right; }

.back-top { position:fixed;bottom:32px;right:32px;width:44px;height:44px;border-radius:50%;background:rgba(42,39,37,0.8);border:1px solid var(--ash);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(20px);transition:all 0.4s;z-index:800;backdrop-filter:blur(8px); }
.back-top.show { opacity:1;transform:translateY(0); }
.back-top:hover { border-color:var(--amber);background:rgba(200,147,90,0.15); }
.back-top svg { width:16px;height:16px;stroke:var(--warm-gray);fill:none;stroke-width:2; }
.back-top:hover svg { stroke:var(--amber); }

@media (max-width:900px) {
  .sys-row { grid-template-columns:32px 1fr;gap:8px; }
  .sys-type,.sys-disc { display:none; }
  nav { padding:16px 24px; }
  .hero { padding:100px 24px 60px; }
  .cards-section,.systems-list,.detail-header,.detail-search,.detail-nav,.submit-section { padding-left:24px;padding-right:24px; }
  .hero-count { gap:32px; }
}
@media (max-width:600px) {
  .hero-count { flex-direction:column;gap:24px; }
  .hero-stat-num { font-size:2.5rem; }
  .cards-grid { grid-template-columns:1fr; }
}
</style>

function navigate(id) {
  window.location.hash = id ? '#'+id : '';
  closeDropdown();
}

function route() {
  var hash = window.location.hash.replace('#','');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  if (hash && DATA.find(function(d){return d.id===hash})) {
    renderDetail(hash);
    document.getElementById('page-detail').classList.add('active');
    document.getElementById('navBack').classList.add('show');
  } else {
    renderHome();
    document.getElementById('page-home').classList.add('active');
    document.getElementById('navBack').classList.remove('show');
  }
  window.scrollTo(0,0);
}

window.addEventListener('hashchange', route);

function buildDropdown() {
  var menu = document.getElementById('dropdownMenu');
  menu.innerHTML = DATA.map(function(sec,i) {
    return '<a class="nav-dropdown-item" onclick="navigate(\'' + sec.id + '\')"><span class="nav-dropdown-item-name">' + String(i+1).padStart(2,'0') + ' \u2014 ' + sec.category + '</span><span class="nav-dropdown-item-count">' + sec.systems.length + '</span></a>';
  }).join('');
}

function toggleDropdown() { document.querySelector('.nav-dropdown').classList.toggle('open'); }
function closeDropdown() { document.querySelector('.nav-dropdown').classList.remove('open'); }
document.addEventListener('click', function(e) { if (!e.target.closest('.nav-dropdown')) closeDropdown(); });
function toggleNav() {
  var toggle = document.getElementById('navToggle');
  var links = document.getElementById('navLinks');
  var overlay = document.getElementById('navOverlay');
  var isOpen = links.classList.contains('open');
  toggle.classList.toggle('active');
  links.classList.toggle('open');
  overlay.classList.toggle('open');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

// ═══ CUSTOM CURSOR ═══
(function() {
  var cur = document.createElement('div'); cur.className = 'custom-cursor'; document.body.appendChild(cur);
  var dot = document.createElement('div'); dot.className = 'cursor-dot'; document.body.appendChild(dot);
  var cx=0,cy=0,dx=0,dy=0;
  document.addEventListener('mousemove',function(e){dx=e.clientX;dy=e.clientY;dot.style.left=dx+'px';dot.style.top=dy+'px';});
  (function anim(){cx+=(dx-cx)*0.12;cy+=(dy-cy)*0.12;cur.style.left=cx+'px';cur.style.top=cy+'px';requestAnimationFrame(anim);})();
  var ht='a,button,.card,.nav-toggle';
  document.addEventListener('mouseover',function(e){if(e.target.closest(ht))cur.classList.add('hovering');});
  document.addEventListener('mouseout',function(e){if(e.target.closest(ht))cur.classList.remove('hovering');});
  document.body.style.cursor='none';
})();

function esc(s) { var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function scrollToSubmit() {
  document.getElementById('submitSection').scrollIntoView({behavior:'smooth'});
}

function handleSubmit() {
  var name = document.getElementById('subName').value.trim();
  var system = document.getElementById('subSystem').value.trim();
  var discipline = document.getElementById('subDiscipline').value.trim();
  var why = document.getElementById('subWhy').value.trim();
  if (!system) { document.getElementById('subSystem').focus(); return; }
  var subject = encodeURIComponent('System Recommendation: ' + system);
  var body = encodeURIComponent('Name: ' + (name || 'Anonymous') + '\nSystem: ' + system + '\nDiscipline: ' + (discipline || 'Not specified') + '\n\nWhy it belongs:\n' + (why || 'No description provided'));
  window.location.href = 'mailto:mvw@mattvincentwalker.com?subject=' + subject + '&body=' + body;
  document.getElementById('submitForm').style.display = 'none';
  document.getElementById('submitSuccess').style.display = 'block';
}

function renderDetail(id) {
  var idx = DATA.findIndex(function(d){return d.id===id});
  var sec = DATA[idx];
  var prev = idx > 0 ? DATA[idx-1] : null;
  var next = idx < DATA.length-1 ? DATA[idx+1] : null;
  var el = document.getElementById('page-detail');
  var months = Math.ceil(sec.systems.length / 52 * 12);
  var rows = sec.systems.map(function(s,i) {
    var search = s.join(' ').toLowerCase();
    return '<div class="sys-row" data-reveal data-search="' + search.replace(/"/g,'&quot;') + '" style="animation-delay:' + (i*0.02) + 's"><div class="sys-idx">' + String(i+1).padStart(2,'0') + '</div><div class="sys-name">' + esc(s[0]) + '</div><div class="sys-type">' + esc(s[1]) + '</div><div class="sys-disc">' + esc(s[2]) + '</div><div class="sys-desc">' + esc(s[3]) + '</div></div>';
  }).join('');
  var prevHtml = prev ? '<a class="detail-nav-link prev" onclick="navigate(\'' + prev.id + '\')"><span class="detail-nav-dir">\u2190 Previous</span><span class="detail-nav-name">' + esc(prev.category) + '</span></a>' : '<div></div>';
  var nextHtml = next ? '<a class="detail-nav-link next" onclick="navigate(\'' + next.id + '\')"><span class="detail-nav-dir">Next \u2192</span><span class="detail-nav-name">' + esc(next.category) + '</span></a>' : '<div></div>';
  el.innerHTML = '<div class="detail-header"><div class="detail-num">CATEGORY ' + String(idx+1).padStart(2,'0') + ' OF ' + CATS + '</div><div class="detail-title">' + esc(sec.category) + '</div><div class="detail-tagline">' + esc(sec.tagline) + '</div><div class="detail-stats">' + sec.systems.length + ' systems \u00b7 ~' + months + ' months of content</div></div><div class="detail-search"><input type="text" id="detailSearch" placeholder="Filter systems\u2026"><div class="detail-count" id="detailCount">' + sec.systems.length + ' of ' + sec.systems.length + '</div></div><div class="systems-list">' + rows + '</div><div class="detail-nav">' + prevHtml + nextHtml + '</div>';
  var searchInput = document.getElementById('detailSearch');
  var countEl = document.getElementById('detailCount');
  var total = sec.systems.length;
  searchInput.addEventListener('input', function() {
    var q = searchInput.value.toLowerCase().trim();
    var visible = 0;
    document.querySelectorAll('.sys-row').forEach(function(row) {
      var match = !q || row.dataset.search.indexOf(q) !== -1;
      row.style.display = match ? '' : 'none';
      if (match) { visible++; row.classList.add('visible'); }
    });
    countEl.textContent = visible + ' of ' + total;
  });
  observeReveals();
}

var observer;
function observeReveals() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
    });
  }, { threshold:0.08, rootMargin:'0px 0px -30px 0px' });
  document.querySelectorAll('[data-reveal]').forEach(function(el){observer.observe(el)});
}

window.addEventListener('scroll', function() {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 500);
});

buildDropdown();
route();
</script>
</body>
