  <style>
    /* ── RESULTS LAYOUT ── */
    .results-wrap {
      max-width: 760px; margin: 0 auto; padding: 140px 48px 120px;

    /* ── SCORE DISPLAY ── */
    .score-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 5px;
      text-transform: uppercase; color: var(--amber-dim); margin-bottom: 24px;
    }
    .score-number {
      font-family: var(--font-mono); font-size: clamp(72px, 16vw, 120px);
      font-weight: 300; color: var(--white); line-height: 0.9;
      letter-spacing: -0.02em;
    }
    .score-denom {
      font-family: var(--font-mono); font-size: clamp(18px, 4vw, 28px);
      color: var(--muted); font-weight: 300;
    }
    .score-band {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--amber); margin-top: 16px; display: block;
    }

    /* ── METER ── */
    .score-meter { margin: 32px 0 48px; }
    .meter-track {
      height: 3px; background: var(--stone); position: relative; overflow: visible;
    }
    .meter-fill {
      height: 100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber));
      transition: width 1.2s cubic-bezier(0.25,1,0.5,1);
    }
    .meter-marker {
      position: absolute; top: -4px; width: 11px; height: 11px;
      border-radius: 50%; background: var(--amber); border: 2px solid var(--black-warm);
      transform: translateX(-50%); transition: left 1.2s cubic-bezier(0.25,1,0.5,1);
    }
    .meter-labels {
      display: flex; justify-content: space-between; margin-top: 10px;
      font-family: var(--font-mono); font-size: 9px; color: var(--ash);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .band-zones { display: flex; margin-top: 6px; }

    .verdict-block p:last-child { margin-bottom: 0; }
    .verdict-block strong { color: var(--white); font-weight: 500; }

    .pattern-title {
      font-family: var(--font-display); font-size: clamp(20px, 4vw, 30px);
      font-weight: 300; color: var(--muted); margin-bottom: 20px; font-style: italic;

    .pattern-desc p { font-size: 15px; line-height: 1.85; color: var(--light); margin-bottom: 16px; }
    .pattern-desc p:last-child { margin-bottom: 0; }
    .pattern-desc strong { color: var(--white); font-weight: 500; }

    .split-note {
      background: var(--stone); border: 1px solid var(--ash);
      padding: 16px 20px; margin-top: 20px;

    /* ── BREACH BLOCK ── */

    @media (max-width: 900px) {
      .results-wrap { padding: 140px 24px 100px; }

const BAND_VERDICTS = {
  'LIGHT LOAD': `<p>Your shame load is below threshold. This doesn't mean it isn't there — it means it hasn't yet accumulated enough structural pressure to produce consistent behavioral distortion. Either you've done significant prior work on this material, or the compensations are holding well enough that the load hasn't registered yet.</p>
<p><strong>The caution here is specific:</strong> men who score in this range and haven't done substantive inner work often have a defense system so refined that even honest self-report misses the signal. A light load with no prior therapeutic or formational work is worth examining more closely with another person. The ceiling of self-knowledge without external witness is lower than most men believe.</p>
<p>If you have done the work — therapy, pastoral formation, extended accountability — this score reflects that. The patterns are quieter. Keep them that way by maintaining the conditions that quieted them.</p>`,

  'FUNCTIONAL LOAD': `<p>Your shame load is active but <strong>subcritical</strong> — meaning it's producing consistent behavioral drag without yet causing structural failure. You are carrying more than you need to. You are performing with a weight that shouldn't be there. And it is costing you things you may not be able to name yet: relational depth, creative risk, genuine rest, the capacity to be fully present rather than managed.</p>
<p>The functional range is the <em>most dangerous band on this instrument</em> — not because the load is highest, but because men here are performing well enough to avoid confronting what they're carrying. The crisis hasn't come. The compensation is working. That is exactly how the crack goes unaddressed until it becomes structural.</p>
<p>This score is a window. The window is open right now. The work that needs to happen here — shame-informed formation with a person who can hold truth and grace simultaneously — is the work that keeps this band from becoming the next one.</p>`,

  'STRUCTURAL LOAD': `<p>Your shame load has passed the functional threshold into <strong>structural territory</strong> — meaning it is actively shaping your architecture. Not just adding friction to your decisions. Determining them. You are not carrying this load alongside your life. You are building your life around it.</p>
<p>Structural load means the compensations that worked in your 20s and early 30s are showing their seams. The performance is still visible from the outside. From the inside, you know that something is off — that the cost of maintaining the performance has been rising while the return has been declining. That what drives you is not quite what you'd choose if you could choose cleanly.</p>
<p><strong>This is not a verdict about your character.</strong> It is a reading of your load. Men in this band are often the most capable, most self-aware men in any room — which is precisely why the shame has had such good infrastructure to hide in. The work from here is not about finding motivation or rebuilding discipline. It is about sitting with someone who can tell you the truth about what they see without flinching, and learning to receive it without shutting down.</p>`,

  'CRITICAL LOAD': `<p>Your shame load is in critical range. This is not a scare line. It is a factual read of what you reported across 40 statements about your actual behavior.</p>
<p>Critical load does not mean broken. It means the operating system running beneath your performance is under enough structural stress that the question is no longer <em>whether</em> something will give — but where, and when, and whether you'll be the one who chose the timing or whether the timing will be chosen for you.</p>
<p><strong>Men in this range are not weak.</strong> They are often the strongest men in their circles — which is how they got here. Strength without formation is load without drainage. You've carried it. You've kept going. And the cost is written in your score, and in the things you wrote in Part VII, and in the question you almost didn't ask yourself at 11:45pm last Tuesday.</p>
<p>The work from here is not a program. It is not a framework or a course. It is a person — a therapist, a pastoral counselor, a formation director who has done their own work — and a decision to be known more completely than you've allowed yourself to be known. That decision is the only one that matters from this reading.</p>`
};

const PATTERNS = {
  'RUNNER': {
    subtitle: 'Velocity as anesthesia',
    body: `<p>The Runner's primary armor is <strong>forward momentum</strong>. When shame loads, you build. When exposure arrives, you pivot. The business, the next venture, the next goal — movement is the most sophisticated anesthetic ever invented for this pattern, because it looks identical to ambition from the outside.</p>
<p>The tell is that your pace <em>accelerates after failure</em>, not despite it. That you announce the next project within days of the last one detonating. That rest — real rest, not recovery-as-optimization — produces a specific kind of dread that you've learned to outrun by staying in motion.</p>
<p><strong>What it costs you:</strong> The people who are trying to reach you while you're building. The part of yourself that needs to be still long enough to be known. The work that could only happen in the quiet you won't allow. The Runner builds impressive things. He rarely finishes them before he's already ten miles past them.</p>
<p>The break point for the Runner is not a crash. It's a quiet Wednesday when there's nothing left to run toward — and the thing he's been running from has been sitting in the house the whole time.</p>`
  },
  'FIXER': {
    subtitle: 'Indispensability as immunity',
    body: `<p>The Fixer's armor is <strong>service</strong>. Not service as love — service as a system for keeping the verdict at bay. If you are solving problems, carrying others, being needed — then you are not the problem. You are the solution. And solutions don't get put on trial.</p>
<p>The tell is that you flip the conversation to <em>their</em> needs within 90 seconds. That your emotional labor for others exceeds what you'd ever ask of yourself. That you are exhausted in a specific way — not from external demand, but from the internal vigilance required to make sure your indispensability never lapses.</p>
<p><strong>What it costs you:</strong> The people who want to know you rather than be helped by you. Your own needs, which you've learned to route around so efficiently you sometimes forget they exist. The capacity to receive — care, help, vulnerability — which threatens the architecture because it removes your functional role in the room.</p>
<p>The Fixer breaks when the person he's been holding up finally stands on their own. Or when someone looks past the helping and asks what he actually needs. The answer surprises him. He hasn't thought about it in years.</p>`
  },
  'FADER': {
    subtitle: 'Smallness as safety',
    body: `<p>The Fader's armor is <strong>disappearance</strong>. Not the dramatic withdrawal — the slow, calibrated shrinking of the target. If you want less, risk less, expect less — you can fail less visibly. Shame cannot land on a man who has already disqualified himself from the field.</p>
<p>The tell is that your ambitions have become more "realistic" over the years in ways that track precisely to your failures and exposures. That you've developed a fluency with self-deprecation that sits just on the friendly side of self-erasure. That the dreams are still there — you can still feel them — but they live behind glass now, labeled "someone else's territory."</p>
<p><strong>What it costs you:</strong> The life that was actually yours to live. The people who wanted the full version of you and eventually learned to stop asking for it. The clarity you might have operated from if the goal weren't to minimize exposure rather than maximize meaning. The Fader is often one of the most perceptive men in any room — which makes the waste of it specific and significant.</p>
<p>The Fader breaks quietly. Not a blow-up — a dimming. A morning when the low-grade gone-ness has been present long enough that it's hard to remember what the light felt like.</p>`
  },
  'FIGHTER': {
    subtitle: 'Offense as self-defense',
    body: `<p>The Fighter's armor is <strong>voltage</strong>. Shame is not metabolized — it is converted. Converted to anger, to criticism, to the specific electricity that makes rooms go quiet and subordinates careful. Aggression is faster than grief, and it feels better, and it keeps the target off your chest and on someone else's.</p>
<p>The tell is that your anger arrives faster than your hurt. That sarcasm is a close companion — it's the polite cousin of contempt. That you've never fully lost an argument, even when you were wrong. That you're alert, always, to status moves in the room — who is rising, who is making you smaller, who needs to be reminded.</p>
<p><strong>What it costs you:</strong> The people who were trying to get close before they learned not to try. The trust that doesn't rebuild after enough ambient aggression. The feedback that stopped coming because the messenger learned what happens to messengers. The Fighter is often the most capable man in the room — but he's running the room for protection, not for flourishing. That's a different game, and it produces different results.</p>
<p>The Fighter breaks when someone he needed to keep finally doesn't come back. Not from a fight — from a quiet decision. The violence of a closed door is particular to this pattern.</p>`
  }
};

const BREACH = {
  1: {
    title: 'Part I — The Shame Signal',
    subtitle: 'Identity fusion with failure',
    text: 'Your breach runs through <strong>identity</strong>. This is where failure and personhood fuse — where "I made a mistake" becomes "I am a mistake." The compulsive replaying of old failures, the fraud syndrome that success worsens instead of resolves, the difficulty receiving correction without receiving a verdict — these are the signatures of a system that reads every performance against a permanent record of not-enough. The work here is not about confidence or mindset. It\'s about distinguishing the thing from the person who did it.'
  },
  2: {
    title: 'Part II — The Armor Check',
    subtitle: 'The hiding infrastructure',
    text: 'Your breach runs through <strong>armor</strong>. The specific way you hide — and the cost of maintaining the hide — is where the structure is failing. This isn\'t about whether you have coping behaviors. Every man has coping behaviors. It\'s about whether your coping has built its own infrastructure — secrets with gravity, performances that exhaust, anger that functions as pressure release for what you can\'t say directly. Armor that worked in a crisis becomes a prison in a life. The work here is disarmament with someone who won\'t flinch when they see what the armor was hiding.'
  },
  3: {
    title: 'Part III — The Approval Ledger',
    subtitle: 'Whose verdict you\'re still appealing',
    text: 'Your breach runs through <strong>approval</strong> — specifically, through the question of whose voice is still delivering the verdict and how much of what you\'ve built has been a case for the defense. The approval ledger is the place where the man you\'re building for lives — a father, a culture, a ghost from a room twenty years ago who may not even remember the sentence that you\'ve been replying to ever since. The work here is identifying the actual judge — by name, by statement — and finding out whether that court has any legitimate jurisdiction over who you are now.'
  },
  4: {
    title: 'Part IV — The Ownership Audit',
    subtitle: 'What you\'re carrying that isn\'t yours',
    text: 'Your breach runs through <strong>ownership</strong> — the specific confusion between what is yours and what was handed to you. Either you are carrying consequences and emotions and loads that were never yours to carry, or you are dropping loads that were always yours and building scaffolding to avoid noticing. Sometimes both, in the same week. The ownership audit is about finding the actual property lines — what you are genuinely responsible for, what you are not, and where the current arrangement is costing you more than the conflict of changing it would.'
  },
  5: {
    title: 'Part V — The Isolation Index',
    subtitle: 'The power supply for everything else',
    text: 'Your breach runs through <strong>isolation</strong> — and this is the one that powers all the others. Shame is a toxin that requires secrecy to maintain its potency. The reason your load hasn\'t moved — even after all the reading, the self-awareness, the frameworks you\'ve built — is that understanding it alone is not the mechanism of change. The mechanism is being fully known by another person and finding out that the verdict doesn\'t hold in the presence of actual grace. If no one knows you — <em>actually</em> knows you, not your performance or your theology or your business strategy — nothing else in this audit will shift. This is the work beneath the work.'
  }
};

const PART_NAMES = ['Shame Signal','Armor Check','Approval Ledger','Ownership Audit','Isolation Index'];
const ROMAN = ['I','II','III','IV','V'];

function getData() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('debug')) {
    const [sc, lt] = params.get('debug').split(',');
    const score = parseInt(sc) || 100;
    const MAP = {A:'RUNNER',B:'FIXER',C:'FADER',D:'FIGHTER'};
    const pp = MAP[(lt||'').toUpperCase()] || 'RUNNER';
    let band;
    if      (score >= 160) band = 'CRITICAL LOAD';
    else if (score >= 120) band = 'STRUCTURAL LOAD';
    else if (score >= 80)  band = 'FUNCTIONAL LOAD';
    else                   band = 'LIGHT LOAD';
    const p = Math.round(score/5);
    return { part1:p, part2:p, part3:p, part4:p, part5:p, shameLoad:score, band, primaryPattern:pp, secondaryPattern:null, splitPattern:false, breach:3 };
  }
  const s = sessionStorage.getItem('breakpoint_results');
  if (!s) { window.location.href = '/break-point/?redirected=1'; return null; }
  try { return JSON.parse(s); } catch(e) { window.location.href = '/break-point/?redirected=1'; return null; }
}

function render() {
  const d = getData();
  if (!d) return;

  const pct = Math.max(0, Math.min(100, ((d.shameLoad - 40) / 160) * 100));
  const verdict = BAND_VERDICTS[d.band];
  const pattern = PATTERNS[d.primaryPattern];
  const breach = BREACH[d.breach];

  const html = `
    <p class="score-eyebrow">The Break Point — Your Results</p>
    <div style="margin-bottom:12px;">
      <span class="score-number">${d.shameLoad}</span><span class="score-denom"> / 200</span>
    </div>
    <span class="score-band">${d.band}</span>

    <div class="score-meter">
      <div class="meter-track">
        <div class="meter-fill" style="width:${pct}%"></div>
        <div class="meter-marker" style="left:${pct}%"></div>
      </div>
      <div class="band-zones">
        <div class="band-zone"></div><div class="band-zone"></div>
        <div class="band-zone"></div><div class="band-zone"></div>
      </div>
      <div class="meter-labels">
        <span>40 — Light</span><span>80 — Functional</span>
        <span>120 — Structural</span><span>160 — Critical</span>
      </div>
    </div>

    <p class="results-label">Band Verdict</p>
    <div class="verdict-block">${verdict}</div>

    <div class="results-divider"></div>

    <p class="results-label">Your Achievement Pattern</p>
    <div class="pattern-block">
      <span class="pattern-name">Primary Pattern — ${d.primaryPattern}</span>
      <p class="pattern-title">${pattern.subtitle}</p>
      <div class="pattern-desc">${pattern.body}</div>
      ${d.splitPattern && d.secondaryPattern ? `
        <div class="split-note">
          <strong>Split pattern detected:</strong> Your scores show a close secondary pattern — <strong>THE ${d.secondaryPattern}</strong>. These two patterns often operate in rotation: one surfaces under one class of pressure, the other under a different class. Both are load-bearing.
        </div>` : ''}
    </div>

    <div class="results-divider"></div>

    <p class="results-label">Your Breach Point</p>
    <div class="breach-block">
      <span class="breach-label">${breach.title}</span>
      <p class="breach-title">${breach.subtitle}</p>
      <p class="breach-text">${breach.text}</p>
    </div>

    <div class="results-divider"></div>

    <p class="results-label">Part Breakdown</p>
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px;">Where the load concentrates across five domains.</p>
    <div class="part-chart">
      ${[1,2,3,4,5].map(n => `
        <div class="chart-row">
          <span class="chart-label">Part ${ROMAN[n-1]}</span>
          <div class="chart-bar-track">
            <div class="chart-bar-fill" id="bar-${n}"></div>
          </div>
          <span class="chart-score">${d['part'+n]}/40</span>
        </div>`).join('')}
    </div>
    <p style="font-size:12px;color:var(--ash);margin-top:8px;font-style:italic;">
      ${PART_NAMES.map((n,i)=>`Part ${ROMAN[i]} = ${n}`).join(' · ')}
    </p>

    <div class="email-gate">
      <p class="email-gate-eyebrow">The Vincere Society</p>
      <h2 class="email-gate-heading">Get the full report — in writing.</h2>
      <p class="email-gate-body">
        Enter your name and email. Your complete Break Point report — band verdict, full pattern profile, breach analysis, and the next steps specific to your score — will be delivered to your inbox.<br><br>
        <strong>This is the only time it will be sent.</strong> You won't be able to retrieve it from this page after you leave.
      </p>
      <form id="gate-form" onsubmit="submitGate(event)">
        <div class="form-row">
          <input type="text" id="f-first" class="form-input" placeholder="First Name" required autocomplete="given-name">
          <input type="email" id="f-email" class="form-input" placeholder="Email Address" required autocomplete="email">
        </div>
        <p class="form-error" id="gate-error"></p>
        <button type="submit" class="btn-primary" id="gate-submit" style="width:100%;margin-top:8px;">Send My Full Report →</button>
        <p class="form-privacy">No spam. Unsubscribe any time. Part VII answers were never recorded — your private written responses stay with you.</p>
      </form>
    </div>
  `;

  document.getElementById('results-wrap').innerHTML = html;

  requestAnimationFrame(() => {
    setTimeout(() => {
      [1,2,3,4,5].forEach((n,i) => {
        setTimeout(() => {
          const el = document.getElementById('bar-'+n);
          if (el) el.style.width = ((d['part'+n]/40)*100)+'%';
        }, i*100);
      });
    }, 200);
  });
}

async function submitGate(e) {
  e.preventDefault();
  const btn = document.getElementById('gate-submit');
  const err = document.getElementById('gate-error');
  const firstName = document.getElementById('f-first').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!firstName || !email) return;

  btn.textContent = 'Sending…'; btn.disabled = true;
  err.classList.remove('visible');

  const d = getData();
  if (!d) return;

  try {
    const res = await fetch('/.netlify/functions/kit-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName, email,
        shameLoad: d.shameLoad, band: d.band,
        primaryPattern: d.primaryPattern, secondaryPattern: d.secondaryPattern,
        breach: d.breach,
        part1: d.part1, part2: d.part2, part3: d.part3, part4: d.part4, part5: d.part5
      })
    });
    const json = await res.json();
    if (json.ok) {
      sessionStorage.setItem('breakpoint_firstName', firstName);
      window.location.href = '/break-point/book/';
    } else { throw new Error(); }
  } catch {
    btn.textContent = 'Send My Full Report →'; btn.disabled = false;
    err.textContent = 'Something broke on our end — your results are still on this screen. Screenshot them and try again in a minute.';
    err.classList.add('visible');
  }
}

window.addEventListener('DOMContentLoaded', render);
</script>
<script src="../../js/main.js"></script>
</body>
</html>
